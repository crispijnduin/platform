name: Deploy naar IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish Platform.csproj -c Release -o "$env:GITHUB_WORKSPACE\publish"

      - name: Stop App Pool
        run: C:\Windows\System32\inetsrv\appcmd.exe stop apppool /apppool.name:"PlatformPool"

      - name: Deploy bestanden
        run: |
          $src = "$env:GITHUB_WORKSPACE\publish"
          $dst = "C:\inetpub\wwwroot\platform"
          robocopy $src $dst /E /IS /PURGE /XD "umbraco\Data\TEMP" "umbraco\Logs" "wwwroot\media"
          if ($LASTEXITCODE -ge 8) { exit 1 }

      - name: Start App Pool
        if: always()
        run: C:\Windows\System32\inetsrv\appcmd.exe start apppool /apppool.name:"PlatformPool"
