name: Deploy naar IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish Platform.csproj -c Release -o "$env:GITHUB_WORKSPACE\publish"

      - name: Stop worker process
        run: |
          Get-Process -Name "w3wp" -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -Seconds 2
          Write-Host "Worker processes stopped"

      - name: Deploy bestanden
        run: |
          $src = "$env:GITHUB_WORKSPACE\publish"
          $dst = "C:\inetpub\wwwroot\platform"
          robocopy $src $dst /E /IS /PURGE /XD "umbraco\Data\TEMP" "umbraco\Logs" "wwwroot\media"
          if ($LASTEXITCODE -ge 8) { exit 1 }
